<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday_Compiler // Thu Thu Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Padauk:wght@400;700&display=swap');
        
        :root {
            --term-black: #000000;
            --term-gray: #0a0a0a;
            --term-border: #3f3f46;
            --term-red: #dc2626;
            --term-purple: #7c3aed;
            --term-red-glow: rgba(220, 38, 38, 0.2);
            --term-purple-glow: rgba(124, 58, 237, 0.2);
            --term-text: #e4e4e7;
        }

        body { 
            font-family: 'Fira Code', monospace; 
            background-color: var(--term-black); 
            color: var(--term-text); 
            /* Subtle scanline effect */
            background-image: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(20, 20, 20, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
        }

        .myanmar-text { font-family: 'Padauk', sans-serif; line-height: 1.8; font-size: 0.85rem;}
        @media (min-width: 1024px) {
            .myanmar-text { line-height: 2.2; font-size: 1.1rem; }
        }

        /* IDE Panel Styling */
        .ide-panel { 
            background: var(--term-gray);
            border: 1px solid var(--term-border);
            transition: border-color 0.2s;
        }

        .ide-panel:hover {
            border-color: #52525b;
        }

        .code-btn {
            background: transparent;
            color: var(--term-red);
            border: 1px solid var(--term-red);
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .code-btn:hover:not(:disabled) {
            background: var(--term-red);
            color: var(--term-black);
            box-shadow: 0 0 10px var(--term-red-glow);
        }

        .code-btn.btn-purple {
            color: var(--term-purple);
            border-color: var(--term-purple);
        }

        .code-btn.btn-purple:hover:not(:disabled) {
            background: var(--term-purple);
            color: var(--term-black);
            box-shadow: 0 0 10px var(--term-purple-glow);
        }

        .code-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .code-btn:disabled {
            border-color: #3f3f46;
            color: #52525b;
            cursor: not-allowed;
            background: transparent !important;
            box-shadow: none !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--term-black); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 0; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--term-red); }

        .loader { 
            border: 2px solid #18181b; 
            border-top: 2px solid var(--term-red); 
            width: 40px; 
            height: 40px; 
            animation: spin 0.8s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .file-card { 
            border-left: 2px solid transparent; 
            border-bottom: 1px solid #18181b;
        }
        .file-card.processing { border-left-color: var(--term-red); background: rgba(220, 38, 38, 0.05); }
        .file-card.done { border-left-color: #10b981; opacity: 0.6; }

        input, textarea, select {
            background: var(--term-black);
            border: 1px solid var(--term-border);
            color: var(--term-text);
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: var(--term-red);
            outline: none;
            box-shadow: inset 0 0 5px var(--term-red-glow);
        }

        @media (min-width: 1024px) {
            .app-container { height: 100vh; overflow: hidden; }
            .main-content { height: calc(100vh - 65px); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen app-container">

    <header class="p-2 lg:p-3 border-b border-zinc-800 bg-black flex justify-between items-center sticky top-0 z-50 shrink-0">
        <div class="flex items-center gap-2 lg:gap-3">
            <button id="toggleSidebar" class="p-1.5 text-zinc-400 hover:text-red-500 transition-colors" title="Toggle Explorer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
            <div class="flex items-center gap-1 lg:gap-2">
                <span class="text-red-600 font-bold">~</span>
                <span class="text-zinc-500">/</span>
                <span class="text-zinc-300 font-bold tracking-wider text-[10px] lg:text-sm">THU_THU</span>
                <span class="text-zinc-500">/</span>
                <span class="text-red-500 text-[10px] lg:text-sm truncate max-w-[100px] lg:max-w-none">sunday_compiler</span>
            </div>
        </div>
        <div id="queueCount" class="text-[10px] lg:text-xs text-red-500 border border-red-900 bg-red-950/30 px-2 py-1">Q: 0</div>
    </header>

    <main class="flex-1 flex flex-row main-content overflow-hidden relative">
        
        <section id="sidebar" class="hidden lg:flex w-[200px] absolute lg:relative z-40 h-[calc(100vh-50px)] lg:h-auto lg:w-80 p-2 lg:p-4 flex-col gap-2 lg:gap-4 border-r border-zinc-800 shrink-0 bg-[#050505] overflow-y-auto custom-scrollbar shadow-2xl lg:shadow-none">
            
            <div id="dropZone" class="h-16 lg:h-20 shrink-0 ide-panel flex flex-col items-center justify-center cursor-pointer group">
                <p class="text-[10px] lg:text-xs text-zinc-400 group-hover:text-red-500 transition-colors"><span class="text-red-600">></span> upload_images.sh</p>
                <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            </div>

            <div class="flex flex-col gap-1 shrink-0">
                <div class="flex justify-between items-center pb-1 border-b border-zinc-800">
                    <h3 class="text-[10px] uppercase text-zinc-500">Workspace</h3>
                    <button id="clearAll" class="text-[9px] hover:text-red-500 transition-colors">rm -rf /</button>
                </div>
                <div id="fileQueue" class="space-y-0 overflow-y-auto max-h-32 custom-scrollbar">
                    <div class="text-center py-4 text-zinc-600 text-[10px]">No active targets</div>
                </div>
            </div>

            <div class="flex flex-col gap-1 shrink-0">
                <h3 class="text-[10px] uppercase text-red-500 border-b border-zinc-800 pb-1">dict.json (Glossary)</h3>
                <textarea id="glossaryArea" class="w-full h-24 p-2 text-[10px] custom-scrollbar" placeholder="Character Name = ဘာသာပြန်အမည်"></textarea>
            </div>

            <div class="flex flex-col gap-2 mt-2 shrink-0">
                <button id="startBtn" class="code-btn py-1.5 lg:py-2 text-[10px] lg:text-xs" disabled>
                    ./run_ocr.sh
                </button>
                <button id="translateBtn" class="code-btn py-1.5 lg:py-2 text-[10px] lg:text-xs" disabled>
                    ./compile_myanmar.sh
                </button>
                <button id="typesetBtn" class="code-btn btn-purple py-1.5 lg:py-2 text-[10px] lg:text-xs" disabled>
                    ./typeset_output.sh
                </button>
            </div>

            <div class="mt-auto pt-2 shrink-0">
                <label class="block text-[9px] uppercase text-zinc-500 mb-1">AI MODEL</label>
                <select id="modelSelect" class="w-full p-2 text-[10px] lg:text-xs">
                    <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash Preview (Canvas Supported)</option>
                </select>
            </div>

            <div class="mt-2 shrink-0 border border-zinc-800 p-2 bg-[#0a0a0a]">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] uppercase text-zinc-500">RPM Load (Est)</span>
                    <span id="rpmCount" class="text-[9px] text-emerald-500 font-bold">0 / 15</span>
                </div>
                <div class="w-full bg-black h-1.5 border border-zinc-800 relative overflow-hidden">
                    <div id="rpmBar" class="absolute top-0 left-0 h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section class="flex-1 p-1 lg:p-4 flex flex-col gap-2 lg:gap-4 bg-black relative w-full overflow-hidden">
            <div class="flex-1 flex flex-row gap-1 lg:gap-4 h-full overflow-hidden">
                
                <div class="w-1/2 flex flex-col gap-1 lg:gap-2 h-full relative">
                    <div class="flex gap-1 h-6 lg:h-8 shrink-0">
                        <button id="tabImg" class="px-2 lg:px-4 border border-zinc-800 bg-zinc-900 text-red-500 text-[10px] lg:text-xs transition-colors flex items-center justify-center">
                            <span class="hidden sm:inline">viewer.exe</span><span class="sm:hidden">IMG</span>
                        </button>
                        <button id="tabRaw" class="px-2 lg:px-4 border border-zinc-800 bg-black text-zinc-400 text-[10px] lg:text-xs hover:bg-zinc-900 transition-colors flex items-center justify-center">
                            <span class="hidden sm:inline">raw_data.txt</span><span class="sm:hidden">RAW</span>
                        </button>
                        <div class="flex-1 border-b border-zinc-800"></div>
                        <button id="copyBtn" class="px-2 lg:px-3 text-zinc-400 hover:text-red-500 hidden border-b border-zinc-800" title="Copy">
                            <svg class="w-3 h-3 lg:w-4 lg:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>

                    <div class="flex-1 relative overflow-hidden border border-zinc-800">
                        <div id="imageViewer" class="absolute inset-0 w-full h-full p-1 lg:p-4 bg-[#0a0a0a] custom-scrollbar overflow-y-auto flex flex-col gap-2 lg:gap-4">
                            <div class="text-center py-10 text-zinc-600 text-[10px] lg:text-xs">Waiting for stream...</div>
                        </div>
                        <textarea id="resultArea" class="absolute inset-0 w-full h-full p-2 lg:p-4 text-[10px] lg:text-xs focus:outline-none bg-[#050505] custom-scrollbar resize-none leading-relaxed hidden" placeholder="> Awaiting OCR..."></textarea>
                    </div>
                </div>

                <div class="w-1/2 flex flex-col gap-1 lg:gap-2 h-full">
                    <div class="flex justify-between items-end h-6 lg:h-8 shrink-0 border-b border-zinc-800 pb-1">
                        <h2 class="text-[10px] lg:text-xs text-red-500 pl-1 lg:pl-2 truncate w-16 lg:w-auto">output.txt</h2>
                        <div class="flex gap-1 lg:gap-2">
                            <input type="text" id="filenameInput" class="px-1 lg:px-2 h-5 lg:h-6 w-12 lg:w-24 text-[8px] lg:text-[10px] focus:outline-none bg-black border border-zinc-800" placeholder="filename" value="Chapter">
                            <button id="copyTransBtn" class="text-zinc-400 hover:text-red-500 px-1 lg:px-2 text-[8px] lg:text-[10px]">COPY</button>
                            <button id="downloadBtn" class="text-red-500 hover:text-red-400 px-1 lg:px-2 text-[8px] lg:text-[10px]">SAVE</button>
                        </div>
                    </div>
                    <textarea id="translationArea" class="flex-1 border border-zinc-800 p-2 lg:p-4 myanmar-text focus:outline-none bg-[#050505] custom-scrollbar resize-none" placeholder="> ဘာသာပြန်အဖြေ..."></textarea>
                </div>
            </div>
            
            <div id="processingOverlay" class="hidden absolute inset-0 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center gap-4 z-50">
                <div class="loader"></div>
                <div class="text-center font-mono">
                    <p id="progressText" class="text-red-500 text-[10px] lg:text-sm">EXECUTING</p>
                    <p id="chunkText" class="text-[8px] lg:text-[10px] text-zinc-500 mt-1">> Establishing secure connection...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-4 right-4 translate-y-32 transition-all duration-300 bg-black text-red-500 px-4 py-2 lg:px-6 lg:py-3 border border-red-900 shadow-2xl z-[100] text-[10px] lg:text-xs shadow-[0_0_15px_rgba(220,38,38,0.2)] whitespace-nowrap"></div>

    <script>
        const apiKey = ""; // Environment provided fallback
        const MAX_STRIP_HEIGHT = 2000; 
        const MAX_WIDTH = 1200; 
        let queue = [];
        let isProcessing = false;
        let speechBubbleCoordinates = []; // Keeps track of visual coordinates for accurate Option B rendering

        const el = {
            sidebar: document.getElementById('sidebar'),
            toggleSidebar: document.getElementById('toggleSidebar'),
            fileInput: document.getElementById('fileInput'),
            dropZone: document.getElementById('dropZone'),
            fileQueue: document.getElementById('fileQueue'),
            glossaryArea: document.getElementById('glossaryArea'),
            startBtn: document.getElementById('startBtn'),
            translateBtn: document.getElementById('translateBtn'),
            typesetBtn: document.getElementById('typesetBtn'),
            resultArea: document.getElementById('resultArea'),
            translationArea: document.getElementById('translationArea'),
            imageViewer: document.getElementById('imageViewer'),
            tabRaw: document.getElementById('tabRaw'),
            tabImg: document.getElementById('tabImg'),
            overlay: document.getElementById('processingOverlay'),
            progressText: document.getElementById('progressText'),
            chunkText: document.getElementById('chunkText'),
            queueCount: document.getElementById('queueCount'),
            copyBtn: document.getElementById('copyBtn'),
            copyTransBtn: document.getElementById('copyTransBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            filenameInput: document.getElementById('filenameInput'),
            clearAll: document.getElementById('clearAll'),
            toast: document.getElementById('toast'),
            modelSelect: document.getElementById('modelSelect'),
            rpmCount: document.getElementById('rpmCount'),
            rpmBar: document.getElementById('rpmBar')
        };

        // Mobile Sidebar Logic
        el.toggleSidebar.onclick = () => {
            if (el.sidebar.classList.contains('hidden')) {
                el.sidebar.classList.remove('hidden');
                el.sidebar.classList.add('flex');
            } else {
                el.sidebar.classList.add('hidden');
                el.sidebar.classList.remove('flex');
            }
        };

        // Storage initialization
        el.glossaryArea.value = localStorage.getItem('sundayComicGlossary') || '';
        el.glossaryArea.addEventListener('input', (e) => localStorage.setItem('sundayComicGlossary', e.target.value));
        
        if (localStorage.getItem('sundayComicModel')) {
            el.modelSelect.value = localStorage.getItem('sundayComicModel');
        }
        el.modelSelect.addEventListener('change', (e) => localStorage.setItem('sundayComicModel', e.target.value));

        // Auto-Load saved text
        el.resultArea.value = localStorage.getItem('sundayComicRawText') || '';
        el.translationArea.value = localStorage.getItem('sundayComicTransText') || '';
        if(el.resultArea.value.trim().length > 0) el.translateBtn.disabled = false;
        if(el.translationArea.value.trim().length > 0) el.typesetBtn.disabled = false;
        
        // Auto-Save when manually typing
        el.resultArea.addEventListener('input', (e) => {
            localStorage.setItem('sundayComicRawText', e.target.value);
            el.translateBtn.disabled = e.target.value.trim() === '';
        });
        el.translationArea.addEventListener('input', (e) => {
            localStorage.setItem('sundayComicTransText', e.target.value);
            el.typesetBtn.disabled = e.target.value.trim() === '';
        });

        // Tab Logic
        el.tabImg.onclick = () => {
            el.tabImg.className = "px-2 lg:px-4 border border-zinc-800 bg-zinc-900 text-red-500 text-[10px] lg:text-xs transition-colors flex items-center justify-center";
            el.tabRaw.className = "px-2 lg:px-4 border border-zinc-800 bg-black text-zinc-400 text-[10px] lg:text-xs hover:bg-zinc-900 transition-colors flex items-center justify-center";
            el.resultArea.classList.add('hidden');
            el.imageViewer.classList.remove('hidden');
            el.copyBtn.classList.add('hidden'); 
            renderImageViewer();
        };
        el.tabRaw.onclick = () => {
            el.tabRaw.className = "px-2 lg:px-4 border border-zinc-800 bg-zinc-900 text-red-500 text-[10px] lg:text-xs transition-colors flex items-center justify-center";
            el.tabImg.className = "px-2 lg:px-4 border border-zinc-800 bg-black text-zinc-400 text-[10px] lg:text-xs hover:bg-zinc-900 transition-colors flex items-center justify-center";
            el.resultArea.classList.remove('hidden');
            el.imageViewer.classList.add('hidden');
            el.copyBtn.classList.remove('hidden'); 
        };

        // File Management
        el.dropZone.onclick = () => el.fileInput.click();
        el.fileInput.onchange = (e) => addFiles(Array.from(e.target.files));
        
        el.clearAll.onclick = () => { 
            queue.forEach(item => URL.revokeObjectURL(item.url));
            queue = []; 
            speechBubbleCoordinates = [];
            renderQueue(); 
            
            // Clear memory
            el.resultArea.value = ""; 
            el.translationArea.value = ""; 
            localStorage.removeItem('sundayComicRawText');
            localStorage.removeItem('sundayComicTransText');
            
            el.translateBtn.disabled = true; 
            el.typesetBtn.disabled = true;
            renderImageViewer();
            showToast("[System] Workspace memory wiped.");
        };

        function addFiles(files) {
            const newItems = files
                .filter(file => file.type.startsWith('image/'))
                .map(file => ({ 
                    id: Math.random().toString(36).substr(2, 9), 
                    file: file, 
                    url: URL.createObjectURL(file), 
                    status: 'pending' 
                }));
            queue = [...queue, ...newItems].sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
            renderQueue();
            renderImageViewer();
            showToast(`[System] ${files.length} payload(s) loaded.`);
            if(window.innerWidth < 1024) el.sidebar.classList.add('hidden');
        }

        function renderQueue() {
            el.queueCount.textContent = `Q: ${queue.length}`;
            el.startBtn.disabled = isProcessing || queue.length === 0;
            if (queue.length === 0) {
                el.fileQueue.innerHTML = `<div class="text-center py-4 text-zinc-600 text-[10px]">No active targets</div>`;
                return;
            }
            el.fileQueue.innerHTML = queue.map((item, idx) => `
                <div class="file-card ${item.status} py-1 px-2 flex items-center justify-between">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span class="text-[9px] text-zinc-500">${idx+1}.</span>
                        <p class="text-[10px] text-zinc-300 truncate">${item.file.name}</p>
                    </div>
                    <div class="shrink-0">
                        ${item.status === 'processing' ? '<div class="w-1.5 h-1.5 bg-red-600 animate-pulse rounded-full"></div>' : ''}
                        ${item.status === 'done' ? '<span class="text-[9px] text-emerald-500">OK</span>' : ''}
                        ${item.status === 'error' ? '<span class="text-[9px] text-red-500">ERR</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderImageViewer() {
            if (queue.length === 0) {
                el.imageViewer.innerHTML = `<div class="text-center py-10 text-zinc-600 text-[10px] lg:text-xs">Waiting for stream...</div>`;
                return;
            }
            el.imageViewer.innerHTML = queue.map((item, idx) => `
                <div class="relative border border-zinc-800 mb-2 lg:mb-4 bg-zinc-950">
                    <div class="absolute top-0 left-0 bg-black text-red-500 px-2 py-1 text-[9px] border-r border-b border-zinc-800 z-10">ID: PAGE_${idx + 1}</div>
                    <img id="render-src-${idx}" src="${item.url}" class="w-full h-auto block opacity-80 hover:opacity-100 transition-opacity">
                </div>
            `).join('');
        }

        // ==========================================
        // API UTILITY
        // ==========================================
        const FREE_RPM_LIMIT = 15;
        let requestTimestamps = [];

        function trackApiRequest() {
            requestTimestamps.push(Date.now());
            updateApiUsage();
        }

        function updateApiUsage() {
            const now = Date.now();
            requestTimestamps = requestTimestamps.filter(t => now - t < 60000);
            
            const currentRpm = requestTimestamps.length;
            const percentage = Math.min((currentRpm / FREE_RPM_LIMIT) * 100, 100);
            
            if (el.rpmCount && el.rpmBar) {
                el.rpmCount.textContent = `${currentRpm} / ${FREE_RPM_LIMIT}`;
                el.rpmBar.style.width = `${percentage}%`;
                
                if (percentage < 50) {
                    el.rpmBar.className = "absolute top-0 left-0 h-full bg-emerald-500 transition-all duration-300";
                    el.rpmCount.className = "text-[9px] text-emerald-500 font-bold";
                } else if (percentage < 80) {
                    el.rpmBar.className = "absolute top-0 left-0 h-full bg-yellow-500 transition-all duration-300";
                    el.rpmCount.className = "text-[9px] text-yellow-500 font-bold";
                } else {
                    el.rpmBar.className = "absolute top-0 left-0 h-full bg-red-500 shadow-[0_0_8px_rgba(220,38,38,0.6)] transition-all duration-300";
                    el.rpmCount.className = "text-[9px] text-red-500 font-bold animate-pulse";
                }
            }
        }

        setInterval(updateApiUsage, 1000);

        async function fetchWithBackoff(model, payload) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 6; i++) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                    trackApiRequest();
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API Error: ${res.status} - ${errText}`);
                    }
                    return await res.json();
                } catch (e) {
                    if (i === 5) throw e;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // ==========================================
        // 1. OCR EXECUTION (Capturing Text & Bounding Coordinates)
        // ==========================================
        el.startBtn.onclick = async () => {
            isProcessing = true;
            renderQueue();
            el.overlay.classList.remove('hidden');
            
            if(el.resultArea.value.trim() === "") el.resultArea.value = "";
            speechBubbleCoordinates = []; 

            for (let i = 0; i < queue.length; i++) {
                const item = queue[i];
                if (item.status === 'done') continue;
                item.status = 'processing';
                renderQueue();
                el.progressText.textContent = `EXTRACTING_DATA [${i + 1}/${queue.length}]`;
                try {
                    const text = await processSingleFile(item.file, i);
                    if(text.trim()) {
                        el.resultArea.value += (el.resultArea.value ? "\n\n" : "") + text;
                        localStorage.setItem('sundayComicRawText', el.resultArea.value);
                    }
                    item.status = 'done';
                } catch (err) {
                    console.error("OCR Error:", err);
                    item.status = 'error';
                }
                renderQueue();
                el.resultArea.scrollTop = el.resultArea.scrollHeight;
            }
            isProcessing = false;
            el.overlay.classList.add('hidden');
            if(el.resultArea.value.trim().length > 0) el.translateBtn.disabled = false;
            renderQueue();
            showToast("[Success] OCR sequence complete.");
            el.tabRaw.click();
        };

        async function processSingleFile(file, pageIndex) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = async () => {
                    let { width, height } = img;
                    let scale = width > MAX_WIDTH ? MAX_WIDTH / width : 1;
                    const drawWidth = width * scale;
                    const drawHeight = height * scale;
                    const chunksCount = Math.ceil(drawHeight / MAX_STRIP_HEIGHT);
                    let combinedTextParts = [];

                    for (let c = 0; c < chunksCount; c++) {
                        el.chunkText.textContent = `> Processing segment ${c + 1}/${chunksCount}...`;
                        const chunkCanvasH = Math.min(MAX_STRIP_HEIGHT, drawHeight - (c * MAX_STRIP_HEIGHT));
                        const canvas = document.createElement('canvas');
                        canvas.width = drawWidth;
                        canvas.height = chunkCanvasH;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, (c * MAX_STRIP_HEIGHT) / scale, width, chunkCanvasH / scale, 0, 0, drawWidth, chunkCanvasH);
                        
                        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                        try {
                            const result = await callGeminiOCR(base64, pageIndex, c, chunkCanvasH, drawWidth);
                            if (result && result.trim()) combinedTextParts.push(result.trim());
                        } catch (e) {
                            console.error("Chunk failed", e);
                            combinedTextParts.push(`[SYSTEM ERROR: Chunk failed to process]`);
                        }

                        if (c < chunksCount - 1) await new Promise(r => setTimeout(r, 1200));
                    }
                    URL.revokeObjectURL(img.src);
                    resolve(combinedTextParts.join("\n\n"));
                };
                img.onerror = () => reject("Load failed");
            });
        }

        async function callGeminiOCR(base64, pageIndex, chunkIndex, chunkHeight, canvasWidth) {
            const model = el.modelSelect.value || 'gemini-2.5-flash-preview-09-2025';
            const prompt = `Perform highly accurate OCR on this manga/comic layout. Return a JSON object containing an array called "bubbles". Each bubble element MUST be an object containing "text" (the transcription string) and "box" [ymin, xmin, ymax, xmax] coordinates localized inside the panel space (normalized 0-1000 bounds). Maintain strict reading sequence orders.`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                generationConfig: {
                    temperature: 0.1, 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            bubbles: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        text: { type: "STRING" },
                                        box: {
                                            type: "ARRAY",
                                            items: { type: "NUMBER" },
                                            description: "[ymin, xmin, ymax, xmax] standardized scale coordinates mapping"
                                        }
                                    },
                                    required: ["text", "box"]
                                }
                            }
                        },
                        required: ["bubbles"]
                    }
                }
            };

            try {
                const data = await fetchWithBackoff(model, payload);
                const rawJson = data.candidates?.[0]?.content?.parts?.[0]?.text || "{\"bubbles\":[]}";
                let parsed = JSON.parse(rawJson);
                
                if (parsed.bubbles) {
                    parsed.bubbles.forEach(b => {
                        // Store spatial bounding boxes mapped across chunks accurately
                        speechBubbleCoordinates.push({
                            pageIndex: pageIndex,
                            text: b.text,
                            box: b.box // [ymin, xmin, ymax, xmax]
                        });
                    });
                    return parsed.bubbles.map(b => b.text.replace(/\n/g, ' ').trim()).filter(t => t.length > 0).join('\n\n');
                }
                return "";
            } catch (e) {
                console.error("Coordinates gathering error", e);
                return "";
            }
        }

        // ==========================================
        // 2. TRANSLATION EXECUTION
        // ==========================================
        el.translateBtn.onclick = async () => {
            const rawText = el.resultArea.value.trim();
            if (!rawText) return;
            isProcessing = true;
            el.overlay.classList.remove('hidden');
            el.progressText.textContent = "COMPILING_MYANMAR";
            el.chunkText.textContent = "> Injecting glossary definitions...";

            try {
                const inputArray = rawText.split('\n\n').filter(l => l.trim().length > 0);
                const translationData = await callGeminiTranslate(inputArray);
                el.translationArea.value = translationData.translation;
                
                localStorage.setItem('sundayComicTransText', el.translationArea.value);
                el.typesetBtn.disabled = false;
                
                if (translationData.newTerms && translationData.newTerms.toUpperCase() !== "NONE") {
                    const currentGlossary = el.glossaryArea.value.trim();
                    const existingLines = currentGlossary.toLowerCase().split('\n');
                    
                    const termsToAdd = translationData.newTerms.split('\n')
                        .filter(t => t.includes('=') && !existingLines.some(el => el.includes(t.split('=')[0].trim().toLowerCase())))
                        .join('\n');

                    if (termsToAdd) {
                        el.glossaryArea.value = currentGlossary ? currentGlossary + '\n' + termsToAdd : termsToAdd;
                        localStorage.setItem('sundayComicGlossary', el.glossaryArea.value);
                        showToast("[System] dict.json updated automatically.");
                    }
                } else {
                     showToast("[Success] Build compiled. Ready for final tuning and typesetting.");
                }
            } catch (err) {
                console.error("Translation Error:", err);
                showToast("[Error] Compilation failed.");
            } finaly {
                isProcessing = false;
                el.overlay.classList.add('hidden');
            }
        };

        async function callGeminiTranslate(inputArray) {
            const model = el.modelSelect.value || 'gemini-2.5-flash-preview-09-2025';
            const currentGlossary = el.glossaryArea.value.trim();
            const glossaryInstruction = currentGlossary ? `\nMANDATORY GLOSSARY:\n${currentGlossary}` : "";

            const systemPrompt = `You are an elite Manga Localizer. Translate from English to natural, fluid Myanmar (Burmese). Map strictly 1-to-1 inside the array fields.${glossaryInstruction}`;

            const payload = {
                contents: [{ parts: [{ text: JSON.stringify(inputArray) }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            translatedBubbles: { type: "ARRAY", items: { type: "STRING" } },
                            newTerms: { type: "STRING" }
                        },
                        required: ["translatedBubbles", "newTerms"]
                    }
                }
            };

            const data = await fetchWithBackoff(model, payload);
            const rawJson = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
            let parsedResult = JSON.parse(rawJson);
            let transArray = parsedResult.translatedBubbles || [];
            let cleanedTranslation = transArray.map(bubble => bubble.replace(/[၊။]/g, ' ').trim()).join('\n\n');

            return { translation: cleanedTranslation, newTerms: parsedResult.newTerms || "NONE" };
        }

        // ==========================================
        // 3. TYPESETTING CORE ENGINE (Option B Processing Interface)
        // ==========================================
        el.typesetBtn.onclick = async () => {
            const finalBurmeseText = el.translationArea.value.trim();
            if (!finalBurmeseText) return;

            isProcessing = true;
            el.overlay.classList.remove('hidden');
            el.progressText.textContent = "TYPESETTING_LAYOUTS";
            el.chunkText.textContent = "> Inpainting text structures and rendering fonts...";

            try {
                const burmeseLines = finalBurmeseText.split('\n\n').filter(l => l.trim().length > 0);
                
                // Process each individual page layout asynchronously
                for(let p = 0; p < queue.length; p++) {
                    const imgElement = document.getElementById(`render-src-${p}`);
                    if(!imgElement) continue;

                    const canvas = document.createElement('canvas');
                    canvas.width = imgElement.naturalWidth || imgElement.width;
                    canvas.height = imgElement.naturalHeight || imgElement.height;
                    const ctx = canvas.getContext('2d');
                    
                    // Draw base comic image
                    ctx.drawImage(imgElement, 0, 0);

                    // Filter tracked nodes mapped explicitly to this unique page index
                    const pageNodes = speechBubbleCoordinates.filter(node => node.pageIndex === p);

                    pageNodes.forEach((node, index) => {
                        const targetBurmeseText = burmeseLines[index] || "";
                        if(!targetBurmeseText || !node.box) return;

                        // Coordinates conversion from normalized 0-1000 layout bounds
                        const ymin = (node.box[0] / 1000) * canvas.height;
                        const xmin = (node.box[1] / 1000) * canvas.width;
                        const ymax = (node.box[2] / 1000) * canvas.height;
                        const xmax = (node.box[3] / 1000) * canvas.width;

                        const boxWidth = xmax - xmin;
                        const boxHeight = ymax - ymin;
                        const centerX = xmin + (boxWidth / 2);
                        const centerY = ymin + (boxHeight / 2);

                        // 1. Inpaint Clean Fill (Whitewashing native speech balloon zones cleanly)
                        ctx.fillStyle = "#FFFFFF";
                        ctx.beginPath();
                        ctx.ellipse(centerX, centerY, boxWidth / 2, boxHeight / 2, 0, 0, 2 * Math.PI);
                        ctx.fill();

                        // 2. Typesetter Font Layout Computations
                        const computedFontSize = Math.max(12, Math.floor(boxHeight * 0.18));
                        ctx.font = `bold ${computedFontSize}px 'Padauk', sans-serif`;
                        ctx.fillStyle = "#000000";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";

                        // 3. Automated Line Wrapping rules for diamond/oval boundaries
                        wrapAndRenderMyanmarText(ctx, targetBurmeseText, centerX, centerY, boxWidth * 0.85, computedFontSize * 1.2);
                    });

                    // Update Image Viewer pipeline with the beautiful typeset results seamlessly
                    imgElement.src = canvas.toDataURL('image/jpeg', 0.95);
                }

                showToast("[Success] Canvas panels updated dynamically!");
                el.tabImg.click(); // Switch views instantly to let you review the typeset graphics
            } catch (err) {
                console.error("Typesetting Error: ", err);
                showToast("[Error] Layout assembly encountered an operational bug.");
            } finally {
                isProcessing = false;
                el.overlay.classList.add('hidden');
            }
        };

        // Custom Layout text rendering configuration rule
        function wrapAndRenderMyanmarText(ctx, text, centerX, centerY, maxWidth, lineHeight) {
            let words = text.split(' ');
            let lines = [];
            let currentLine = "";

            for (let n = 0; n < words.length; n++) {
                let testLine = currentLine + words[n] + " ";
                let metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    lines.push(currentLine);
                    currentLine = words[n] + " ";
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);

            // Center alignment vertical offsetting
            let startY = centerY - ((lines.length - 1) * lineHeight) / 2;
            for (let k = 0; k < lines.length; k++) {
                ctx.fillText(lines[k].trim(), centerX, startY + (k * lineHeight));
            }
        }

        // ==========================================
        // UTILITIES
        // ==========================================
        el.downloadBtn.onclick = () => {
            const text = el.translationArea.value.trim();
            if (!text) {
                showToast("[Warning] Output buffer is empty.");
                return;
            }
            
            let filename = el.filenameInput.value.trim();
            if (filename === "") filename = "Translated_Chapter";
            if (!filename.toLowerCase().endsWith(".txt")) filename += ".txt";

            const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("[System] File saved to local drive.");
        };

        function copy(text, msg) {
            const ta = document.createElement("textarea");
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(msg);
        }

        el.copyBtn.onclick = () => copy(el.resultArea.value, "[System] RAW text copied to clipboard.");
        el.copyTransBtn.onclick = () => copy(el.translationArea.value, "[System] MYANMAR text copied to clipboard.");

        function showToast(msg) {
            el.toast.textContent = msg;
            el.toast.classList.remove('translate-y-32');
            el.toast.classList.add('translate-y-0');
            setTimeout(() => {
                el.toast.classList.remove('translate-y-0');
                el.toast.classList.add('translate-y-32');
            }, 3000);
        }
    </script>
