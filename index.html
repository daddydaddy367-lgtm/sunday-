<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunday_Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .ide-panel { background: #0a0a0a; border: 1px solid #3f3f46; }
        .code-btn { border: 1px solid #dc2626; color: #dc2626; padding: 10px; width: 100%; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .code-btn:hover { background: #dc2626; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="flex gap-4">
        <div class="w-64 flex flex-col gap-2">
            <input type="file" id="fileInput" class="hidden">
            <button class="code-btn" id="uploadBtn">1. UPLOAD</button>
            <button class="code-btn" id="ocrBtn">2. RUN OCR</button>
            <button class="code-btn" id="transBtn">3. TRANSLATE</button>
            <button class="code-btn" id="typesetBtn">4. TYPESET</button>
        </div>
        <div class="flex-1">
            <div id="imageViewer" class="ide-panel min-h-[500px] flex items-center justify-center border border-zinc-700"></div>
            <textarea id="resultArea" class="w-full h-32 bg-[#050505] border border-zinc-700 mt-2 p-2 text-xs" placeholder="JSON output..."></textarea>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6KTTq9OYSVVM95cagneaZ-VwrNXsktjhxs9R67TVs2YFA";
        const API_URL = https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY};

        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');

        document.getElementById('uploadBtn').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'mainCanvas';
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    document.getElementById('imageViewer').innerHTML = '';
                    document.getElementById('imageViewer').appendChild(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('ocrBtn').onclick = async () => {
            const canvas = document.getElementById('mainCanvas');
            const data = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Extract text and coordinates in JSON: {coordinates: [{x,y,w,h}], text: []}" }, { inline_data: { mime_type: "image/jpeg", data: canvas.toDataURL('image/jpeg').split(',')[1] } }] }] })
            }).then(r => r.json());
            resultArea.value = data.candidates[0].content.parts[0].text.replace(/`json|```/g, '');
        };

        document.getElementById('transBtn').onclick = async () => {
            const currentData = JSON.parse(resultArea.value);
            const data = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Translate this list to Burmese: " + JSON.stringify(currentData.text) + ". Return ONLY the translated list." }] }] })
            }).then(r => r.json());
            currentData.translatedText = JSON.parse(data.candidates[0].content.parts[0].text);
            resultArea.value = JSON.stringify(currentData, null, 2);
        };

        document.getElementById('typesetBtn').onclick = () => {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const data = JSON.parse(resultArea.value);
            
            const wrapText = (text, x, y, maxWidth, lineHeight) => {
                let words = text.split(' '), line = '', lineY = y;
                for(let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                        ctx.fillText(line, x, lineY);
                        line = words[n] + ' ';
                        lineY += lineHeight;
                    } else { line = testLine; }
                }
                ctx.fillText(line, x, lineY);
            };

            data.coordinates.forEach((box, i) => {
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(box.x, box.y, box.w, box.h);
                ctx.fillStyle = "black";
                ctx.font = "20px 'Padauk'";
                wrapText(data.translatedText[i], box.x + 5, box.y + 25, box.w - 10, 25);
            });
        };
    </script>
</body>
</html>
