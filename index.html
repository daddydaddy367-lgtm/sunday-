<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunday_Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .ide-panel { background: #0a0a0a; border: 1px solid #3f3f46; }
        .code-btn { border: 1px solid #dc2626; color: #dc2626; padding: 10px; width: 100%; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .code-btn:hover { background: #dc2626; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="flex gap-4">
        <div class="w-64 flex flex-col gap-2">
            <input type="file" id="fileInput" class="hidden">
            <button class="code-btn" id="uploadBtn">1. UPLOAD</button>
            <button class="code-btn" id="ocrBtn">2. RUN OCR</button>
            <button class="code-btn" id="transBtn">3. TRANSLATE</button>
            <button class="code-btn" id="typesetBtn">4. TYPESET</button>
        </div>
        
        <div class="flex-1">
            <div id="imageViewer" class="ide-panel min-h-[500px] flex items-center justify-center border border-zinc-700">
                <p class="text-zinc-600">No image loaded</p>
            </div>
            <textarea id="resultArea" class="w-full h-32 bg-[#050505] border border-zinc-700 mt-2 p-2 text-xs" placeholder="JSON output..."></textarea>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const imageViewer = document.getElementById('imageViewer');
        const resultArea = document.getElementById('resultArea');

        document.getElementById('uploadBtn').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'mainCanvas';
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    imageViewer.innerHTML = '';
                    imageViewer.appendChild(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('ocrBtn').onclick = async () => {
            const canvas = document.getElementById('mainCanvas');
            if (!canvas) return;
            const imageData = canvas.toDataURL('image/jpeg');
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Extract text and coordinates from this image in JSON format" }, { inline_data: { mime_type: "image/jpeg", data: imageData.split(',')[1] } }] }] })
            });
            const result = await response.json();
            resultArea.value = result.candidates[0].content.parts[0].text;
        };

        document.getElementById('transBtn').onclick = async () => {
            const data = JSON.parse(resultArea.value);
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Translate this list of bubbles to Burmese and return in the same JSON format: " + JSON.stringify(data.translatedBubbles) }] }] })
            });
            const result = await response.json();
            data.translatedBubbles = JSON.parse(result.candidates[0].content.parts[0].text);
            resultArea.value = JSON.stringify(data, null, 2);
        };

        document.getElementById('typesetBtn').onclick = () => {
            const canvas = document.getElementById('mainCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = JSON.parse(resultArea.value);
            data.coordinates.forEach((box, i) => {
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(box.x, box.y, box.w, box.h);
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "20px 'Padauk'";
                ctx.fillText(data.translatedBubbles[i], box.x + (box.w / 2), box.y + (box.h / 2));
            });
        };
    </script>
</body>
</html>
