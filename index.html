<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunday_Compiler // Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .ide-panel { border: 1px solid #333; background: #0a0a0a; }
        .btn { border: 1px solid #dc2626; color: #dc2626; padding: 10px; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; }
        .btn:hover { background: #dc2626; color: #000; }
        canvas { max-width: 100%; height: auto; }
    </style>
</head>
<body class="p-4 flex gap-4">
    <section class="w-80 flex flex-col gap-2">
        <input type="file" id="fileInput" multiple class="hidden">
        <label for="fileInput" class="btn text-center">1. UPLOAD IMAGES</label>
        <button id="runOcr" class="btn">2. RUN OCR</button>
        <button id="runTypeset" class="btn">3. TYPESET (FIXED)</button>
        <textarea id="transArea" class="w-full h-40 bg-black border border-zinc-800 p-2 text-xs" placeholder="Myanmar Text Here..."></textarea>
    </section>

    <section id="viewer" class="flex-1 border border-zinc-800 p-2 overflow-y-auto h-screen"></section>

    <script>
        let files = [];
        let bubbles = []; // Stores {box: [ymin, xmin, ymax, xmax], text: "..."}

        // 1. UPLOAD
        document.getElementById('fileInput').onchange = (e) => {
            files = Array.from(e.target.files);
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = files.map((f, i) => `<img src="${URL.createObjectURL(f)}" id="img-${i}" class="mb-4">`).join('');
        };

        // 2. OCR (Manual data injection to ensure it runs)
        document.getElementById('runOcr').onclick = () => {
            bubbles = [{ box: [50, 50, 150, 300], text: "Hello" }]; // Example box
            alert("OCR Data Mocked! You can now Typeset.");
        };

        // 3. TYPESET (THE FIX)
        document.getElementById('runTypeset').onclick = () => {
            const transText = document.getElementById('transArea').value;
            
            files.forEach((file, i) => {
                const img = document.getElementById(`img-${i}`);
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                bubbles.forEach(b => {
                    const [ymin, xmin, ymax, xmax] = b.box;
                    const bw = xmax - xmin;
                    const bh = ymax - ymin;

                    // ERASE
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(xmin, ymin, bw, bh);

                    // DRAW
                    ctx.fillStyle = "#000000";
                    ctx.font = "bold 30px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(transText || "ဘာသာပြန်", xmin + (bw/2), ymin + (bh/2));
                });

                img.src = canvas.toDataURL();
            });
        };
    </script>
</body>
</html>
