<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Sunday Compiler Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <div class="flex gap-6">
        <div class="w-72 flex flex-col gap-3">
            <input type="file" id="fileInput" class="hidden">
            <button class="bg-red-700 p-3 w-full font-bold uppercase hover:bg-red-600" onclick="document.getElementById('fileInput').click()">1. Upload</button>
            <button class="bg-red-700 p-3 w-full font-bold uppercase hover:bg-red-600" id="ocrBtn">2. Run OCR</button>
            <button class="bg-red-700 p-3 w-full font-bold uppercase hover:bg-red-600" id="transBtn">3. Translate</button>
            <button class="bg-red-700 p-3 w-full font-bold uppercase hover:bg-red-600" id="typeBtn">4. Typeset</button>
        </div>
        <div class="flex-1">
            <div id="canvasContainer" class="border border-zinc-600 min-h-[500px] flex items-center justify-center"></div>
            <textarea id="resultArea" class="w-full h-40 mt-4 bg-zinc-900 p-4 border border-zinc-600 text-sm font-mono"></textarea>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6KTTq9OYSVVM95cagneaZ-VwrNXsktjhxs9R67TVs2YFA";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const resArea = document.getElementById('resultArea');

        // ပုံတင်ခြင်း
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'mainCanvas';
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    document.getElementById('canvasContainer').innerHTML = '';
                    document.getElementById('canvasContainer').appendChild(canvas);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // OCR ဆွဲထုတ်ခြင်း
        document.getElementById('ocrBtn').onclick = async () => {
            const canvas = document.getElementById('mainCanvas');
            const data = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Extract text and box coordinates {x,y,w,h} as JSON object" }, { inline_data: { mime_type: "image/jpeg", data: canvas.toDataURL('image/jpeg').split(',')[1] } }] }] })
            }).then(r => r.json());
            resArea.value = data.candidates[0].content.parts[0].text.replace(/
json|
        };

        // ဘာသာပြန်ခြင်း
        document.getElementById('transBtn').onclick = async () => {
            let data = JSON.parse(resArea.value);
            const trans = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Translate this list to Burmese, keep order: " + JSON.stringify(data.text) }] }] })
            }).then(r => r.json());
            data.translated = JSON.parse(trans.candidates[0].content.parts[0].text.replace(/
json|```/g, '').trim());
            resArea.value = JSON.stringify(data, null, 2);
        };

        // Typesetting လုပ်ခြင်း
        document.getElementById('typeBtn').onclick = () => {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const data = JSON.parse(resArea.value);
            
            data.coordinates.forEach((box, i) => {
                ctx.fillStyle = "white";
                ctx.fillRect(box.x, box.y, box.w, box.h);
                ctx.fillStyle = "black";
                ctx.font = "bold 18px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(data.translated[i] || "", box.x + box.w/2, box.y + box.h/2 + 7);
            });
        };
    </script>
</body>
</html>

`
