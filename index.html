<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday_Compiler // Thu Thu Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Padauk:wght@400;700&display=swap');
        
        :root {
            --term-black: #000000;
            --term-gray: #0a0a0a;
            --term-border: #3f3f46;
            --term-red: #dc2626;
            --term-purple: #7c3aed;
            --term-red-glow: rgba(220, 38, 38, 0.2);
            --term-purple-glow: rgba(124, 58, 237, 0.2);
            --term-text: #e4e4e7;
        }

        body { font-family: 'Fira Code', monospace; background-color: var(--term-black); color: var(--term-text); }
        .myanmar-text { font-family: 'Padauk', sans-serif; }
        .ide-panel { background: var(--term-gray); border: 1px solid var(--term-border); }
        .code-btn { background: transparent; color: var(--term-red); border: 1px solid var(--term-red); text-transform: uppercase; transition: all 0.2s; }
        .code-btn:hover:not(:disabled) { background: var(--term-red); color: var(--term-black); }
        .code-btn.btn-purple { color: var(--term-purple); border-color: var(--term-purple); }
        .code-btn.btn-purple:hover:not(:disabled) { background: var(--term-purple); color: var(--term-black); }
        .code-btn:disabled { border-color: #3f3f46; color: #52525b; cursor: not-allowed; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--term-black); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; }
        .loader { border: 2px solid #18181b; border-top: 2px solid var(--term-red); width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input, textarea, select { background: var(--term-black); border: 1px solid var(--term-border); color: var(--term-text); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="p-4 border-b border-zinc-800 bg-black flex justify-between items-center">
        <span class="text-red-500 font-bold">SUNDAY_COMPILER</span>
        <div id="queueCount" class="text-xs text-red-500">Q: 0</div>
    </header>

    <main class="flex-1 flex p-4 gap-4">
        <section id="sidebar" class="w-80 flex flex-col gap-4">
            <label id="dropZone" for="fileInput" class="h-20 ide-panel flex items-center justify-center cursor-pointer text-xs text-zinc-400">UPLOAD_IMAGES.SH</label>
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <textarea id="glossaryArea" class="w-full h-24 p-2 text-xs" placeholder="Glossary: Character Name = ဘာသာပြန်"></textarea>
            <button id="startBtn" class="code-btn py-2 text-xs" disabled>./RUN_OCR.SH</button>
            <button id="translateBtn" class="code-btn py-2 text-xs" disabled>./COMPILE_MYANMAR.SH</button>
            <button id="typesetBtn" class="code-btn btn-purple py-2 text-xs" disabled>./TYPESET_OUTPUT.SH</button>
        </section>

        <section class="flex-1 flex flex-col gap-4">
            <div class="flex-1 border border-zinc-800 bg-[#0a0a0a] overflow-auto p-4" id="imageViewer"></div>
            <textarea id="translationArea" class="h-48 w-full p-4 myanmar-text bg-[#050505] border border-zinc-800" placeholder="> Myanmar Translation..."></textarea>
        </section>
    </main>

    <div id="processingOverlay" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-50">
        <div class="loader"></div>
        <p id="progressText" class="text-red-500 mt-4">PROCESSING...</p>
    </div>

    <script>
        let queue = [], speechBubbleCoordinates = [], isProcessing = false;
        const el = {
            fileInput: document.getElementById('fileInput'),
            startBtn: document.getElementById('startBtn'),
            translateBtn: document.getElementById('translateBtn'),
            typesetBtn: document.getElementById('typesetBtn'),
            translationArea: document.getElementById('translationArea'),
            imageViewer: document.getElementById('imageViewer'),
            overlay: document.getElementById('processingOverlay'),
            progressText: document.getElementById('progressText'),
            queueCount: document.getElementById('queueCount')
        };

        el.fileInput.onchange = (e) => {
            queue = Array.from(e.target.files).map(f => ({ file: f, url: URL.createObjectURL(f) }));
            el.queueCount.textContent = `Q: ${queue.length}`;
            renderViewer();
            updateButtons();
        };

        function renderViewer() {
            el.imageViewer.innerHTML = queue.map((item, i) => `<img src="${item.url}" class="mb-4">`).join('');
        }

        function updateButtons() {
            el.startBtn.disabled = isProcessing || queue.length === 0;
            el.translateBtn.disabled = isProcessing || queue.length === 0;
            el.typesetBtn.disabled = isProcessing || el.translationArea.value.trim() === '';
        }

        // TYPESET ENGINE: PRECISION MASKING & DRAWING
        el.typesetBtn.onclick = async () => {
            isProcessing = true;
            updateButtons();
            el.overlay.classList.remove('hidden');
            
            const lines = el.translationArea.value.trim().split('\n\n');
            
            for(let i = 0; i < queue.length; i++) {
                const item = queue[i];
                const bubbles = speechBubbleCoordinates.filter(b => b.pageIndex === i);
                
                await new Promise(resolve => {
                    const img = new Image();
                    img.src = item.url;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        bubbles.forEach((b, idx) => {
                            const text = lines[idx] || b.text;
                            const [ymin, xmin, ymax, xmax] = b.box;
                            const bw = xmax - xmin;
                            const bh = ymax - ymin;

                            // 1. STEP: ERASE EXACTLY
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(xmin, ymin, bw, bh);

                            // 2. STEP: PREPARE FONT
                            let fontSize = Math.max(16, bh / 2.5);
                            ctx.font = `700 ${fontSize}px 'Padauk', sans-serif`;
                            ctx.textAlign = "center";
                            ctx.textBaseline = "top"; // Forces anchor to ymin

                            // 3. STEP: WRAP
                            const words = text.split(' ');
                            let linesArr = [], cur = "";
                            words.forEach(w => {
                                if(ctx.measureText(cur + w).width > bw) { linesArr.push(cur); cur = w + " "; }
                                else cur += w + " ";
                            });
                            linesArr.push(cur);

                            // 4. STEP: CENTER VERTICALLY
                            let lineHeight = fontSize * 1.2;
                            let startY = ymin + (bh - (linesArr.length * lineHeight)) / 2;

                            // 5. STEP: DRAW
                            linesArr.forEach((line, lIdx) => {
                                ctx.fillStyle = "#000000";
                                ctx.fillText(line, xmin + bw/2, startY + (lIdx * lineHeight));
                            });
                        });
                        
                        item.url = canvas.toDataURL('image/jpeg', 0.95);
                        resolve();
                    };
                });
            }
            renderViewer();
            el.overlay.classList.add('hidden');
            isProcessing = false;
            updateButtons();
        };
    </script>
</body>
</html>
